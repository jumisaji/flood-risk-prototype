# Render Blueprint for the Flood Risk Prediction API.
# Commit at the repo root; Render will detect it, or set the same values manually.
services:
  - type: web
    name: flood-risk-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
